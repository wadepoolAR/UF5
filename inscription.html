<!DOCTYPE html>
<html lang="fr">

    <style>
        .inscription-section {
            padding: 100px 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            position: relative;
            overflow: hidden;
        }
        
        .inscription-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('images/section-bg-imgae-1.svg') no-repeat center center;
            background-size: cover;
            opacity: 0.1;
            z-index: 1;
        }
        
        .inscription-container {
            position: relative;
            z-index: 2;
        }
        
        .map-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 700px;
        }
        
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 700px;
            overflow-y: auto;
        }
        
        #map {
            height: 100%;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .form-title {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            color: #fff;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            font-size: 1.1rem;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            padding: 15px 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ff6b35;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
            color: #fff;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .btn-inscription {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 15px 40px;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-inscription:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
            color: #fff;
        }
        
        .selected-info {
            background: rgba(255, 107, 53, 0.1);
            border: 2px solid rgba(255, 107, 53, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .selected-info h6 {
            color: #ff6b35;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .venue-option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }
        
        .venue-option:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: rgba(255, 107, 53, 0.5);
            transform: translateX(5px);
        }
        
        .venue-option.selected {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
        }
        
        .venue-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .venue-address {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .section-title h2 {
            color: #fff;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section-title p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .leaflet-popup-content-wrapper {
            background: rgba(26, 26, 26, 0.95);
            color: #fff;
            border-radius: 10px;
        }
        
        .leaflet-popup-content {
            color: #fff;
        }
        
        .leaflet-popup-tip {
            background: rgba(26, 26, 26, 0.95);
        }
        
        .city-popup h6 {
            color: #ff6b35;
            margin-bottom: 10px;
        }
        
        .city-popup .btn {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .map-container,
            .form-container {
                height: auto;
                margin-bottom: 30px;
            }
            
            .form-title {
                font-size: 2rem;
            }
            
            .section-title h2 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="loader">
            <img src="images/loader.svg" alt="Loader">
        </div>
    </div>

    <!-- Header -->
    <header class="main-header active-sticky-header">
        <div class="header-sticky">
            <nav class="navbar navbar-expand-lg">
                <div class="container">
                    <a class="navbar-brand" href="index.html">
                        <img src="images/logo.svg" alt="UF5" class="logo">
                    </a>
                    <div class="responsive-menu"></div>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto" id="menu">
                            <li class="nav-item">
                                <a class="nav-link" href="index.html">Accueil</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" href="inscription.html">Inscription</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#contact">Contact</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Inscription Section -->
    <section class="inscription-section">
        <div class="container inscription-container">
            <div class="section-title">
                <h2 class="text-anime-style-3">Inscription au Tournoi</h2>
                <p class="text-anime-style-1">Sélectionnez votre ville sur la carte et choisissez votre lieu de sélection</p>
            </div>
            
            <div class="row">
                <!-- Carte -->
                <div class="col-lg-6 mb-4">
                    <div class="map-container">
                        <div id="map"></div>
                    </div>
                </div>
                
                <!-- Formulaire -->
                <div class="col-lg-6">
                    <div class="form-container">
                        <h3 class="form-title">Formulaire d'Inscription</h3>
                        
                        <!-- Informations sélectionnées -->
                        <div id="selectedInfo" class="selected-info" style="display: none;">
                            <h6>Sélection actuelle :</h6>
                            <div id="selectedCity"></div>
                            <div id="selectedVenue"></div>
                        </div>
                        
                        <!-- Lieux disponibles -->
                        <div id="venuesList" style="display: none;">
                            <h6 style="color: #ff6b35; margin-bottom: 15px;">Choisissez votre lieu de sélection :</h6>
                            <div id="venuesContainer"></div>
                        </div>
                        
                        <form id="inscriptionForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label class="form-label">Prénom *</label>
                                        <input type="text" class="form-control" name="prenom" placeholder="Votre prénom" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label class="form-label">Nom *</label>
                                        <input type="text" class="form-control" name="nom" placeholder="Votre nom" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" name="email" placeholder="votre@email.com" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Téléphone *</label>
                                <input type="tel" class="form-control" name="telephone" placeholder="06 12 34 56 78" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label class="form-label">Ville *</label>
                                        <input type="text" class="form-control" name="ville" id="villeInput" placeholder="Sélectionnez sur la carte" readonly required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label class="form-label">Lieu de sélection *</label>
                                        <input type="text" class="form-control" name="lieu_selection" id="lieuInput" placeholder="Choisissez un lieu" readonly required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Position préférée</label>
                                <select class="form-control" name="position">
                                    <option value="">Choisir une position</option>
                                    <option value="gardien">Gardien</option>
                                    <option value="defenseur">Défenseur</option>
                                    <option value="milieu">Milieu</option>
                                    <option value="attaquant">Attaquant</option>
                                    <option value="polyvalent">Polyvalent</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Niveau de jeu</label>
                                <select class="form-control" name="niveau">
                                    <option value="">Évaluer votre niveau</option>
                                    <option value="debutant">Débutant</option>
                                    <option value="intermediaire">Intermédiaire</option>
                                    <option value="confirme">Confirmé</option>
                                    <option value="expert">Expert</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Commentaires</label>
                                <textarea class="form-control" name="commentaires" rows="3" placeholder="Informations supplémentaires..."></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-inscription">
                                <i class="fas fa-futbol me-2"></i>
                                S'inscrire au tournoi
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/swiper-bundle.min.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/jquery.slicknav.js"></script>
    <script src="js/jquery.counterup.min.js"></script>
    <script src="js/jquery.waypoints.min.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/gsap.min.js"></script>
    <script src="js/ScrollTrigger.min.js"></script>
    <script src="js/SplitText.js"></script>
    <script src="js/magiccursor.js"></script>
    <script src="js/parallaxie.js"></script>
    <script src="js/validator.min.js"></script>
    <script src="js/function.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>

        const citiesData = {

            "Nice": {

                venues: [

            "Nantes": {
                coords: [47.2184, -1.5536],
                venues: [
                    {

                    },

            "Strasbourg": {

                    {

            "Montpellier": {

                    },

                        coords: [43.6310, 3.8567]
                    }
                ]
            },
            "Bordeaux": {

                venues: [
                    {

                    },
                    {

                    }
                ]
            },
            "Lille": {

                venues: [
                    {
                        name: "Stade Pierre-Mauroy",
                        address: "261 Boulevard de Tournai, 59650 Villeneuve-d'Ascq",
                        coords: [50.6119, 3.1306]
                    },
                    {
                        name: "Complexe Sportif de Fives",
                        address: "Rue de Lannoy, 59000 Lille",

                    }
                ]
            }
        };

        let map;
        let selectedCity = null;
        let selectedVenue = null;

        // Initialisation de la carte
        function initMap() {
            map = L.map('map').setView([46.603354, 1.888334], 6);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Ajouter les marqueurs pour chaque ville
            Object.keys(citiesData).forEach(cityName => {
                const city = citiesData[cityName];
                const marker = L.marker(city.coords).addTo(map);
                
                const popupContent = `
                    <div class="city-popup">
                        <h6>${cityName}</h6>
                        <p>${city.venues.length} lieu(x) de sélection disponible(s)</p>
                        <button class="btn" onclick="selectCity('${cityName}')">
                            Sélectionner cette ville
                        </button>
                    </div>
                `;
                
                marker.bindPopup(popupContent);
            });
        }

        // Sélection d'une ville
        function selectCity(cityName) {
            selectedCity = cityName;
            selectedVenue = null;
            
            const city = citiesData[cityName];
            
            // Mettre à jour les champs du formulaire
            document.getElementById('villeInput').value = cityName;
            document.getElementById('lieuInput').value = '';
            
            // Afficher les informations sélectionnées
            document.getElementById('selectedCity').innerHTML = `<strong>Ville :</strong> ${cityName}`;
            document.getElementById('selectedVenue').innerHTML = '';
            document.getElementById('selectedInfo').style.display = 'block';
            
            // Afficher la liste des lieux
            displayVenues(city.venues);
            
            // Centrer la carte sur la ville
            map.setView(city.coords, 12);
            
            // Fermer tous les popups
            map.closePopup();
        }

        // Afficher les lieux disponibles
        function displayVenues(venues) {
            const container = document.getElementById('venuesContainer');
            container.innerHTML = '';
            
            venues.forEach((venue, index) => {
                const venueDiv = document.createElement('div');
                venueDiv.className = 'venue-option';
                venueDiv.onclick = () => selectVenue(venue, venueDiv);
                
                venueDiv.innerHTML = `
                    <div class="venue-name">${venue.name}</div>
                    <div class="venue-address">${venue.address}</div>
                `;
                
                container.appendChild(venueDiv);
            });
            
            document.getElementById('venuesList').style.display = 'block';
        }

        // Sélection d'un lieu
        function selectVenue(venue, element) {
            selectedVenue = venue;
            
            // Retirer la sélection précédente
            document.querySelectorAll('.venue-option').forEach(el => {
                el.classList.remove('selected');
            });
            
            // Ajouter la sélection actuelle
            element.classList.add('selected');
            
            // Mettre à jour les champs du formulaire
            document.getElementById('lieuInput').value = venue.name;
            
            // Mettre à jour les informations affichées
            document.getElementById('selectedVenue').innerHTML = `<strong>Lieu :</strong> ${venue.name}<br><small>${venue.address}</small>`;
        }

        // Soumission du formulaire
        document.getElementById('inscriptionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!selectedCity || !selectedVenue) {
                alert('Veuillez sélectionner une ville et un lieu de sélection sur la carte.');
                return;
            }
            
            // Récupérer les données du formulaire
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Ajouter les informations de sélection
            data.ville_coords = citiesData[selectedCity].coords;
            data.lieu_coords = selectedVenue.coords;
            data.lieu_adresse = selectedVenue.address;
            
            console.log('Données d\'inscription:', data);
            
            // Simulation d'envoi
            alert('Inscription envoyée avec succès ! Vous recevrez un email de confirmation.');
            
            // Réinitialiser le formulaire
            this.reset();
            selectedCity = null;
            selectedVenue = null;
            document.getElementById('selectedInfo').style.display = 'none';
            document.getElementById('venuesList').style.display = 'none';
        });

        // Initialiser la carte au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initMap, 100);
        });
    </script>
</body>
